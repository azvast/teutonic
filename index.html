<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teutonic Validator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

:root {
    --bg: #000;
    --paper: #fff;
    --ink: #000;
    --ink-inv: #fff;
    --border: 1px dashed #000;
    --font: 'Space Mono', monospace;
    --saw: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: var(--ink);
    font: 13px/1.5 var(--font);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 64px 16px;
    -webkit-font-smoothing: none;
}

.page {
    width: 100%;
    max-width: 800px;
    background: var(--paper);
    position: relative;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.page::before, .page::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: var(--saw);
    z-index: 1;
}
.page::before {
    top: calc(var(--saw) * -1);
    background: linear-gradient(-45deg, var(--paper) 5px, transparent 0) 0 5px,
                linear-gradient(45deg, var(--paper) 5px, transparent 0) 0 5px;
    background-size: var(--saw) var(--saw);
    background-repeat: repeat-x;
}
.page::after {
    bottom: calc(var(--saw) * -1);
    background: linear-gradient(-135deg, var(--paper) 5px, transparent 0) 0 5px,
                linear-gradient(135deg, var(--paper) 5px, transparent 0) 0 5px;
    background-size: var(--saw) var(--saw);
    background-repeat: repeat-x;
}

.section-label {
    text-transform: uppercase;
    font-weight: bold;
    font-size: 11px;
    border-bottom: var(--border);
    padding-bottom: 4px;
    margin-bottom: 8px;
}

.chart-box {
    width: 100%;
    height: 120px;
    border: 1px solid var(--ink);
    position: relative;
}
.chart-box svg { width: 100%; height: 100%; }
.svg-line {
    fill: none;
    stroke: var(--ink);
    stroke-width: 1.5;
    stroke-linejoin: bevel;
}
.svg-line-dash {
    fill: none;
    stroke: var(--ink);
    stroke-width: 1;
    stroke-dasharray: 4 3;
    opacity: 0.5;
}
.chart-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    text-transform: uppercase;
    margin-top: 4px;
}

.eval-block {
    font-size: 12px;
    line-height: 1.8;
}
.eval-block .idle {
    text-transform: uppercase;
    font-size: 11px;
}

.queue-list {
    list-style: none;
    font-size: 12px;
}
.queue-list li {
    padding: 2px 0;
    display: flex;
    justify-content: space-between;
}
.queue-list li:hover {
    background: var(--ink);
    color: var(--ink-inv);
    cursor: crosshair;
}
.queue-empty {
    font-size: 11px;
    text-transform: uppercase;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}
th {
    text-transform: uppercase;
    font-weight: normal;
    font-size: 11px;
    text-align: left;
    padding: 4px 0;
    border-bottom: var(--border);
}
td {
    padding: 3px 0;
}
tr { border-bottom: 1px dotted rgba(0,0,0,0.15); }
tr:hover td {
    background: var(--ink);
    color: var(--ink-inv);
    cursor: crosshair;
}
th:last-child, td:last-child { text-align: right; }
</style>
</head>
<body>
<div class="page">

    <div>
        <div class="section-label">Mean Loss</div>
        <div class="chart-box">
            <svg viewBox="0 0 1000 100" preserveAspectRatio="none" id="chart">
                <line x1="0" y1="50" x2="1000" y2="50" stroke="#000" stroke-width="0.3" stroke-dasharray="2 4"/>
                <polyline class="svg-line" id="line-king" points="0,50 1000,50"/>
                <polyline class="svg-line-dash" id="line-chall" points="0,50 1000,50"/>
            </svg>
        </div>
        <div class="chart-meta" id="chart-meta">
            <span>--</span><span>--</span>
        </div>
    </div>

    <div>
        <div class="section-label">Current Evaluation</div>
        <div class="eval-block" id="eval">
            <span class="idle">connecting...</span>
        </div>
    </div>

    <div>
        <div class="section-label">Queue</div>
        <div id="queue"><span class="queue-empty">connecting...</span></div>
    </div>

    <div>
        <div class="section-label">Duel History</div>
        <table>
            <thead><tr>
                <th>Challenger</th>
                <th>Verdict</th>
                <th>Win Rate</th>
                <th>King Loss</th>
                <th>Chall Loss</th>
                <th>Time</th>
            </tr></thead>
            <tbody id="hist"></tbody>
        </table>
    </div>

</div>

<script>
var DATA_URL = "https://pub-0821b4e0d60149b79bad17376722bc75.r2.dev/dashboard.json";
var POLL_MS = 5000;

function short(s, n) { return s ? s.slice(0, n || 12) + "\u2026" : "--"; }

function render(d) {
    var hist = (d.history || []).slice().reverse();
    var ev = d.current_eval;

    // --- 1. Mean Loss Chart ---
    var kingPts = [], challPts = [];
    var minL = Infinity, maxL = -Infinity;

    for (var i = 0; i < hist.length; i++) {
        var kl = hist[i].avg_king_loss || 0;
        var cl = hist[i].avg_challenger_loss || 0;
        if (kl < minL) minL = kl;
        if (kl > maxL) maxL = kl;
        if (cl < minL) minL = cl;
        if (cl > maxL) maxL = cl;
    }
    if (ev && ev.avg_king_loss) {
        if (ev.avg_king_loss < minL) minL = ev.avg_king_loss;
        if (ev.avg_king_loss > maxL) maxL = ev.avg_king_loss;
        if (ev.avg_challenger_loss < minL) minL = ev.avg_challenger_loss;
        if (ev.avg_challenger_loss > maxL) maxL = ev.avg_challenger_loss;
    }

    var pad = (maxL - minL) * 0.1 || 0.5;
    minL -= pad; maxL += pad;
    var totalPts = hist.length + (ev && ev.avg_king_loss ? 1 : 0);

    function toY(v) { return 100 - ((v - minL) / (maxL - minL)) * 100; }

    for (var i = 0; i < hist.length; i++) {
        var x = totalPts > 1 ? Math.round((i / (totalPts - 1)) * 1000) : 500;
        kingPts.push(x + "," + toY(hist[i].avg_king_loss || 0));
        challPts.push(x + "," + toY(hist[i].avg_challenger_loss || 0));
    }
    if (ev && ev.avg_king_loss) {
        kingPts.push("1000," + toY(ev.avg_king_loss));
        challPts.push("1000," + toY(ev.avg_challenger_loss));
    }

    if (kingPts.length > 0) {
        document.getElementById("line-king").setAttribute("points", kingPts.join(" "));
        document.getElementById("line-chall").setAttribute("points", challPts.join(" "));
    }

    var latest = ev && ev.avg_king_loss ? ev.avg_king_loss : (hist.length ? hist[hist.length - 1].avg_king_loss : null);
    var meta = document.getElementById("chart-meta");
    meta.innerHTML = "<span>KING LOSS: " + (latest ? latest.toFixed(4) : "--") + "</span>" +
                     "<span>SAMPLES: " + totalPts + "</span>" +
                     "<span>\u2500 KING  --- CHALLENGER</span>";

    // --- 2. Current Evaluation ---
    var evalEl = document.getElementById("eval");
    if (ev) {
        var pct = ev.total > 0 ? Math.round((ev.progress / ev.total) * 100) : 0;
        var wr = ev.n > 0 ? (ev.win_rate * 100).toFixed(1) + "%" : "--";
        evalEl.innerHTML =
            "<strong>" + (ev.challenger_repo || "--") + "</strong><br>" +
            short(ev.hotkey, 16) + " &mdash; " + ev.challenge_id + "<br>" +
            "PROGRESS: " + ev.progress + "/" + ev.total + " (" + pct + "%) &nbsp; WIN_RATE: " + wr + "<br>" +
            "KING_LOSS: " + (ev.avg_king_loss ? ev.avg_king_loss.toFixed(4) : "--") +
            " &nbsp; CHALL_LOSS: " + (ev.avg_challenger_loss ? ev.avg_challenger_loss.toFixed(4) : "--");
    } else {
        evalEl.innerHTML = '<span class="idle">no active evaluation</span>';
    }

    // --- 3. Queue ---
    var qEl = document.getElementById("queue");
    var q = d.queue || [];
    if (q.length === 0) {
        qEl.innerHTML = '<span class="queue-empty">queue empty</span>';
    } else {
        var items = q.map(function(e) {
            return '<li><span>' + short(e.hotkey, 16) + '</span><span>' + (e.hf_repo || "--") + '</span></li>';
        }).join("");
        qEl.innerHTML = '<ul class="queue-list">' + items + '</ul>';
    }

    // --- 4. Duel History ---
    var hb = document.getElementById("hist");
    var history = d.history || [];
    if (history.length === 0) {
        hb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:16px">No duels yet</td></tr>';
    } else {
        hb.innerHTML = history.map(function(h) {
            return '<tr>' +
                '<td>' + (h.challenger_repo || short(h.hotkey, 12)) + '</td>' +
                '<td>' + (h.accepted ? "CHALLENGER" : "KING") + '</td>' +
                '<td>' + ((h.win_rate || 0) * 100).toFixed(1) + '%</td>' +
                '<td>' + (h.avg_king_loss || 0).toFixed(4) + '</td>' +
                '<td>' + (h.avg_challenger_loss || 0).toFixed(4) + '</td>' +
                '<td>' + (h.wall_time_s || 0).toFixed(0) + 's</td>' +
                '</tr>';
        }).join("");
    }
}

async function poll() {
    try {
        var r = await fetch(DATA_URL + "?t=" + Date.now());
        if (r.ok) render(await r.json());
    } catch (e) {}
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
