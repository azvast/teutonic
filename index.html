<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teuton</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

:root {
    --bg: #000;
    --paper: #fff;
    --ink: #000;
    --ink-inv: #fff;
    --border: 1px dashed #000;
    --font: 'Space Mono', monospace;
    --saw: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--paper);
    color: var(--ink);
    font: 13px/1.5 var(--font);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 0;
    -webkit-font-smoothing: none;
}

.page {
    width: 100%;
    max-width: 1400px;
    background: var(--paper);
    position: relative;
    padding: 32px 48px;
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.page::before, .page::after { display: none; }

.section-label {
    text-transform: uppercase;
    font-weight: bold;
    font-size: 11px;
    border-bottom: var(--border);
    padding-bottom: 4px;
    margin-bottom: 8px;
}

.chart-wrap {
    width: 100%;
    aspect-ratio: 5 / 2;
    position: relative;
}
.chart-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
}
.chart-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    text-transform: uppercase;
    margin-top: 4px;
}

.duel-bar-wrap {
    border: 1px solid var(--ink);
    height: 14px;
    position: relative;
    overflow: hidden;
}
.duel-bar {
    height: 100%;
    background: var(--ink);
    transition: width .4s ease;
}
.duel-info {
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
}
.duel-info span { min-width: 120px; }
.duel-info span:last-child { text-align: right; }
.duel-idle .duel-bar-wrap { opacity: 0.3; }

.scroll-box {
    overflow-y: auto;
    scrollbar-width: thin;
}
.scroll-box::-webkit-scrollbar { width: 4px; }
.scroll-box::-webkit-scrollbar-thumb { background: var(--ink); }
.scroll-queue { max-height: 200px; }
.scroll-hist { max-height: 60vh; }

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    table-layout: fixed;
}
th {
    text-transform: uppercase;
    font-weight: normal;
    font-size: 11px;
    text-align: left;
    padding: 4px 0;
    border-bottom: var(--border);
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 1;
}
td {
    padding: 3px 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
tr { border-bottom: 1px dotted rgba(0,0,0,0.15); }
tr:hover td {
    background: var(--ink);
    color: var(--ink-inv);
    cursor: crosshair;
}
th:last-child, td:last-child { text-align: right; }
</style>
</head>
<body>
<div class="page">

    <div id="top-bar" style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px dashed #000;padding:6px 0;font-size:12px;text-transform:uppercase;">
        <span>TAO <b id="tao-price">--</b> <span id="tao-change" style="font-size:10px"></span></span>
        <span>SN3 ALPHA <b id="alpha-price">--</b></span>
        <span>SN3 REG <b id="reg-cost">--</b></span>
    </div>

    <div style="text-align:center;margin-bottom:8px;">
        <img src="favicon.png" alt="Teuton" style="width:80px;height:80px;margin-bottom:8px;">
        <div style="font-size:20px;font-weight:bold;letter-spacing:0.1em;text-transform:uppercase;">Teutonic-I</div>
        <div id="king-info" style="font-size:11px;text-transform:uppercase;">
            <span id="king-health" title="King repo status"></span>
            <a id="king-link" href="#" target="_blank" style="color:var(--ink);"></a>
            <span id="king-rev" style="opacity:0.6;"></span>
        </div>
        <div id="king-reign" style="font-size:10px;opacity:0.5;margin-top:2px;"></div>
    </div>

    <div>
        <div class="section-label">Best Loss</div>
        <div class="chart-wrap">
            <svg id="chart"></svg>
        </div>
        <div class="chart-meta" id="chart-meta">
            <span>--</span>
        </div>
    </div>

    <div id="duel-section" class="duel-idle">
        <div class="section-label" id="duel-label">Idle</div>
        <div class="duel-bar-wrap"><div class="duel-bar" id="duel-bar" style="width:0%"></div></div>
        <div class="duel-info"><span id="duel-progress">--</span><span id="duel-wr">--</span></div>
    </div>

    <div>
        <div class="section-label">Last Winner</div>
        <div id="last-winner" style="font-size:12px;line-height:1.8;min-height:48px;">--</div>
    </div>

    <div>
        <div class="section-label">Queue</div>
        <div class="scroll-box scroll-queue">
            <table>
                <thead><tr>
                    <th>Repo</th>
                    <th>Hotkey</th>
                    <th>Block</th>
                </tr></thead>
                <tbody id="queue"></tbody>
            </table>
        </div>
    </div>

    <div>
        <div class="section-label">Duel History</div>
        <div class="scroll-box scroll-hist">
            <table>
                <thead><tr>
                    <th>Repo</th>
                    <th>Hotkey</th>
                    <th>Verdict</th>
                    <th>Win Rate</th>
                    <th>Best Loss</th>
                    <th>King Loss</th>
                    <th>Chall Loss</th>
                    <th>Time</th>
                </tr></thead>
                <tbody id="hist"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
var DATA_URL = "https://pub-0821b4e0d60149b79bad17376722bc75.r2.dev/dashboard.json";
var POLL_MS = 5000;

function short(s, n) { return s ? s.slice(0, n || 12) + "\u2026" : "--"; }

function render(d) {
    var mkt = d.market || {};
    if (mkt.tao_price_usd) {
        document.getElementById("tao-price").textContent = "$" + mkt.tao_price_usd.toFixed(2);
        var ch = mkt.tao_change_24h;
        var chEl = document.getElementById("tao-change");
        chEl.textContent = (ch >= 0 ? "+" : "") + ch.toFixed(1) + "%";
        chEl.style.color = ch >= 0 ? "#2a2" : "#c22";
    }
    if (mkt.sn3_alpha_price_tao != null) {
        document.getElementById("alpha-price").textContent = mkt.sn3_alpha_price_tao.toFixed(4) + " \u03C4";
    }
    if (mkt.sn3_reg_burn_tao != null) {
        document.getElementById("reg-cost").textContent = mkt.sn3_reg_burn_tao.toFixed(6) + " \u03C4";
    }

    var king = d.king || {};
    var hist_all = d.history || [];
    var topModel = null;
    for (var ti = 0; ti < hist_all.length; ti++) {
        if (hist_all[ti].accepted && hist_all[ti].challenger_repo) {
            topModel = hist_all[ti]; break;
        }
    }
    var kingRepo = topModel ? topModel.challenger_repo : (king.hf_repo || "--");
    var kingRev = king.king_revision || "";
    var kingLink = document.getElementById("king-link");
    kingLink.href = "https://huggingface.co/" + kingRepo;
    kingLink.textContent = kingRepo;
    var kingRevEl = document.getElementById("king-rev");
    if (kingRev) {
        var commitUrl = "https://huggingface.co/" + kingRepo + "/commit/" + kingRev;
        kingRevEl.innerHTML = '@ <a href="' + commitUrl + '" target="_blank" style="color:var(--ink);opacity:0.6">' + kingRev.slice(0, 8) + '</a>';
    } else {
        kingRevEl.textContent = "";
    }
    var healthEl = document.getElementById("king-health");
    healthEl.textContent = "\u25CF ";
    healthEl.style.color = "#2a2";
    healthEl.title = "King repo live";
    var reignEl = document.getElementById("king-reign");
    reignEl.textContent = king.reign_number != null ? "REIGN #" + king.reign_number + (king.crowned_at ? " \u2014 " + king.crowned_at.slice(0, 16) + "Z" : "") : "";

    var hist = (d.history || []).slice().reverse();
    var ev = d.current_eval;

    // --- 1. Best Loss Chart with axes ---
    var losses = [];
    for (var i = 0; i < hist.length; i++) {
        var kl = hist[i].avg_king_loss || 0;
        var cl = hist[i].avg_challenger_loss || 0;
        var best = hist[i].best_loss || (kl && cl ? Math.min(kl, cl) : kl || cl);
        if (best) losses.push(best);
    }
    if (ev && ev.avg_king_loss) {
        var ekl = ev.avg_king_loss;
        var ecl = ev.avg_challenger_loss || ekl;
        losses.push(Math.min(ekl, ecl));
    }

    var SVG = document.getElementById("chart");
    var rect = SVG.parentElement.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    var W = Math.round(rect.width * dpr);
    var H = Math.round(rect.height * dpr);
    if (W < 100) W = 1400;
    if (H < 40) H = 560;
    var ML = Math.round(70 * dpr), MR = Math.round(16 * dpr);
    var MT = Math.round(16 * dpr), MB = Math.round(36 * dpr);
    var pw = W - ML - MR, ph = H - MT - MB;
    var lw = dpr;

    SVG.setAttribute("viewBox", "0 0 " + W + " " + H);

    if (losses.length < 1) {
        SVG.innerHTML = '<text x="' + (W/2) + '" y="' + (H/2) + '" text-anchor="middle" font-family="Space Mono,monospace" font-size="' + (13*dpr) + '" fill="#000">NO DATA</text>';
        document.getElementById("chart-meta").innerHTML = "<span>--</span>";
    } else {

    var minL = Math.min.apply(null, losses);
    var maxL = Math.max.apply(null, losses);
    var padV = (maxL - minL) * 0.15 || 0.5;
    minL -= padV; maxL += padV;

    function toX(i) { return ML + (losses.length > 1 ? (i / (losses.length - 1)) * pw : pw / 2); }
    function toY(v) { return MT + ph - ((v - minL) / (maxL - minL)) * ph; }

    var svg = '';
    var fs = Math.round(11 * dpr);
    var font = 'font-family="Space Mono,monospace" font-size="' + fs + '" fill="#000"';

    svg += '<line x1="' + ML + '" y1="' + MT + '" x2="' + ML + '" y2="' + (MT + ph) + '" stroke="#000" stroke-width="' + lw + '"/>';
    svg += '<line x1="' + ML + '" y1="' + (MT + ph) + '" x2="' + (ML + pw) + '" y2="' + (MT + ph) + '" stroke="#000" stroke-width="' + lw + '"/>';

    for (var t = 0; t <= 4; t++) {
        var val = minL + (maxL - minL) * (t / 4);
        var yy = toY(val);
        svg += '<line x1="' + (ML - 5*dpr) + '" y1="' + yy + '" x2="' + ML + '" y2="' + yy + '" stroke="#000" stroke-width="' + lw + '"/>';
        svg += '<text x="' + (ML - 8*dpr) + '" y="' + (yy + fs*0.35) + '" text-anchor="end" ' + font + '>' + val.toFixed(2) + '</text>';
        if (t > 0 && t < 4) {
            svg += '<line x1="' + ML + '" y1="' + yy + '" x2="' + (ML + pw) + '" y2="' + yy + '" stroke="#000" stroke-width="' + (0.5*dpr) + '" stroke-dasharray="' + (3*dpr) + ' ' + (6*dpr) + '"/>';
        }
    }

    for (var i = 0; i < losses.length; i++) {
        var xx = toX(i);
        svg += '<line x1="' + xx + '" y1="' + (MT + ph) + '" x2="' + xx + '" y2="' + (MT + ph + 5*dpr) + '" stroke="#000" stroke-width="' + lw + '"/>';
        var label = (ev && i === losses.length - 1) ? "NOW" : "";
        svg += '<text x="' + xx + '" y="' + (MT + ph + 20*dpr) + '" text-anchor="middle" ' + font + '>' + label + '</text>';
    }

    var pts = [];
    for (var i = 0; i < losses.length; i++) {
        pts.push(toX(i).toFixed(1) + "," + toY(losses[i]).toFixed(1));
    }
    svg += '<polyline points="' + pts.join(" ") + '" fill="none" stroke="#000" stroke-width="' + (1.5*dpr) + '" stroke-linejoin="round"/>';

    for (var i = 0; i < losses.length; i++) {
        svg += '<circle cx="' + toX(i).toFixed(1) + '" cy="' + toY(losses[i]).toFixed(1) + '" r="' + (3*dpr) + '" fill="#000"/>';
    }

    SVG.innerHTML = svg;

    var latest = losses[losses.length - 1];
    document.getElementById("chart-meta").innerHTML =
        "<span>CURRENT: " + latest.toFixed(4) + "</span><span>EVALS: " + losses.length + "</span>";

    } // end chart data block

    // --- Current Duel ---
    var duelSec = document.getElementById("duel-section");
    if (ev) {
        duelSec.classList.remove("duel-idle");
        var pct = ev.total > 0 ? Math.round((ev.progress / ev.total) * 100) : 0;
        var duelName = ev.challenger_repo || short(ev.hotkey, 12);
        var duelLabel = document.getElementById("duel-label");
        if (ev.challenger_repo) {
            duelLabel.innerHTML = '<a href="https://huggingface.co/' + ev.challenger_repo + '" target="_blank" style="color:var(--ink)">' + duelName + '</a>';
        } else {
            duelLabel.textContent = duelName;
        }
        document.getElementById("duel-bar").style.width = pct + "%";
        document.getElementById("duel-progress").textContent = ev.progress + " / " + ev.total + "  (" + pct + "%)";
        document.getElementById("duel-wr").textContent = ev.n > 0 ? "WR: " + (ev.win_rate * 100).toFixed(1) + "%" : "";
    } else {
        duelSec.classList.add("duel-idle");
        document.getElementById("duel-label").textContent = "Idle";
        document.getElementById("duel-bar").style.width = "0%";
        document.getElementById("duel-progress").textContent = "--";
        document.getElementById("duel-wr").textContent = "--";
    }

    // --- Last Winner ---
    var lwEl = document.getElementById("last-winner");
    var winner = null;
    for (var i = 0; i < (d.history || []).length; i++) {
        if (d.history[i].accepted) { winner = d.history[i]; break; }
    }
    if (winner) {
        var repo = winner.challenger_repo || "--";
        var link = winner.challenger_repo ? '<a href="https://huggingface.co/' + repo + '" target="_blank" style="color:var(--ink)">' + repo + '</a>' : repo;
        lwEl.innerHTML = link + '<br>' +
            'WIN_RATE: ' + ((winner.win_rate || 0) * 100).toFixed(1) + '% &nbsp; ' +
            'KING_LOSS: ' + (winner.avg_king_loss || 0).toFixed(4) + ' &nbsp; ' +
            'CHALL_LOSS: ' + (winner.avg_challenger_loss || 0).toFixed(4) + ' &nbsp; ' +
            (winner.wall_time_s ? winner.wall_time_s.toFixed(0) + 's' : '');
    } else {
        lwEl.textContent = "NO DETHRONING YET";
    }

    // --- 2. Queue ---
    var qEl = document.getElementById("queue");
    var q = d.queue || [];
    if (q.length === 0) {
        qEl.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:16px">Queue empty</td></tr>';
    } else {
        qEl.innerHTML = q.map(function(e) {
            var repo = e.hf_repo || "--";
            var repoLink = e.hf_repo ? '<a href="https://huggingface.co/' + e.hf_repo + '" target="_blank" style="color:var(--ink)">' + repo + '</a>' : repo;
            return '<tr>' +
                '<td>' + repoLink + '</td>' +
                '<td>' + (e.hotkey ? '<a href="https://taomarketcap.com/hotkey/' + e.hotkey + '/mining_hotkeys" target="_blank" style="color:var(--ink)">' + short(e.hotkey, 16) + '</a>' : '--') + '</td>' +
                '<td>' + (e.block ? '#' + e.block : '--') + '</td>' +
                '</tr>';
        }).join("");
    }

    // --- 4. Duel History ---
    var hb = document.getElementById("hist");
    var history = d.history || [];
    if (history.length === 0) {
        hb.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:16px">No duels yet</td></tr>';
    } else {
        hb.innerHTML = history.map(function(h) {
            var kl = h.avg_king_loss || 0;
            var cl = h.avg_challenger_loss || 0;
            var best = h.best_loss || (kl && cl ? Math.min(kl, cl) : kl || cl);
            var repo = h.challenger_repo || "--";
            var repoLink = h.challenger_repo ? '<a href="https://huggingface.co/' + h.challenger_repo + '" target="_blank" style="color:var(--ink)">' + repo + '</a>' : repo;
            return '<tr>' +
                '<td>' + repoLink + '</td>' +
                '<td>' + (h.hotkey ? '<a href="https://taomarketcap.com/hotkey/' + h.hotkey + '/mining_hotkeys" target="_blank" style="color:var(--ink)">' + short(h.hotkey, 16) + '</a>' : '--') + '</td>' +
                '<td>' + (h.accepted ? "CHALLENGER" : "KING") + '</td>' +
                '<td>' + ((h.win_rate || 0) * 100).toFixed(1) + '%</td>' +
                '<td>' + best.toFixed(4) + '</td>' +
                '<td>' + kl.toFixed(4) + '</td>' +
                '<td>' + cl.toFixed(4) + '</td>' +
                '<td>' + (h.wall_time_s || 0).toFixed(0) + 's</td>' +
                '</tr>';
        }).join("");
    }
}

async function poll() {
    try {
        var r = await fetch(DATA_URL + "?t=" + Date.now());
        if (r.ok) render(await r.json());
    } catch (e) {}
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
