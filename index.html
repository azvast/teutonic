<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teutonic Validator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

:root {
    --bg: #000;
    --paper: #fff;
    --ink: #000;
    --ink-inv: #fff;
    --border: 1px dashed #000;
    --font: 'Space Mono', monospace;
    --saw: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: var(--ink);
    font: 13px/1.5 var(--font);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 64px 16px;
    -webkit-font-smoothing: none;
}

.page {
    width: 100%;
    max-width: 800px;
    background: var(--paper);
    position: relative;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.page::before, .page::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: var(--saw);
    z-index: 1;
}
.page::before {
    top: calc(var(--saw) * -1);
    background: linear-gradient(-45deg, var(--paper) 5px, transparent 0) 0 5px,
                linear-gradient(45deg, var(--paper) 5px, transparent 0) 0 5px;
    background-size: var(--saw) var(--saw);
    background-repeat: repeat-x;
}
.page::after {
    bottom: calc(var(--saw) * -1);
    background: linear-gradient(-135deg, var(--paper) 5px, transparent 0) 0 5px,
                linear-gradient(135deg, var(--paper) 5px, transparent 0) 0 5px;
    background-size: var(--saw) var(--saw);
    background-repeat: repeat-x;
}

.section-label {
    text-transform: uppercase;
    font-weight: bold;
    font-size: 11px;
    border-bottom: var(--border);
    padding-bottom: 4px;
    margin-bottom: 8px;
}

.chart-wrap {
    width: 100%;
    position: relative;
}
.chart-wrap svg {
    width: 100%;
    display: block;
}
.chart-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    text-transform: uppercase;
    margin-top: 4px;
}

.duel-bar-wrap {
    border: 1px solid var(--ink);
    height: 14px;
    position: relative;
    overflow: hidden;
}
.duel-bar {
    height: 100%;
    background: var(--ink);
    transition: width .4s ease;
}
.duel-info {
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
}
.duel-hidden { display: none; }

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}
th {
    text-transform: uppercase;
    font-weight: normal;
    font-size: 11px;
    text-align: left;
    padding: 4px 0;
    border-bottom: var(--border);
}
td {
    padding: 3px 0;
}
tr { border-bottom: 1px dotted rgba(0,0,0,0.15); }
tr:hover td {
    background: var(--ink);
    color: var(--ink-inv);
    cursor: crosshair;
}
th:last-child, td:last-child { text-align: right; }
</style>
</head>
<body>
<div class="page">

    <div style="text-align:center;margin-bottom:8px;">
        <div style="font-size:20px;font-weight:bold;letter-spacing:0.1em;text-transform:uppercase;">Teutonic</div>
        <a href="https://huggingface.co/unconst/Teutonic-I" target="_blank" style="font-size:11px;color:var(--ink);text-transform:uppercase;">huggingface.co/unconst/Teutonic-I</a>
    </div>

    <div>
        <div class="section-label">King Loss</div>
        <div class="chart-wrap">
            <svg id="chart"></svg>
        </div>
        <div class="chart-meta" id="chart-meta">
            <span>--</span>
        </div>
    </div>

    <div id="duel-section" class="duel-hidden">
        <div class="section-label" id="duel-label">Evaluating</div>
        <div class="duel-bar-wrap"><div class="duel-bar" id="duel-bar" style="width:0%"></div></div>
        <div class="duel-info"><span id="duel-progress">--</span><span id="duel-wr">--</span></div>
    </div>

    <div>
        <div class="section-label">Last Winner</div>
        <div id="last-winner" style="font-size:12px;line-height:1.8;">--</div>
    </div>

    <div>
        <div class="section-label">Queue</div>
        <table>
            <thead><tr>
                <th>Hotkey</th>
                <th>Block</th>
                <th>Repo</th>
            </tr></thead>
            <tbody id="queue"></tbody>
        </table>
    </div>

    <div>
        <div class="section-label">Duel History</div>
        <table>
            <thead><tr>
                <th>Challenger</th>
                <th>Verdict</th>
                <th>Win Rate</th>
                <th>King Loss</th>
                <th>Chall Loss</th>
                <th>Time</th>
            </tr></thead>
            <tbody id="hist"></tbody>
        </table>
    </div>

</div>

<script>
var DATA_URL = "https://pub-0821b4e0d60149b79bad17376722bc75.r2.dev/dashboard.json";
var POLL_MS = 5000;

function short(s, n) { return s ? s.slice(0, n || 12) + "\u2026" : "--"; }

function render(d) {
    var hist = (d.history || []).slice().reverse();
    var ev = d.current_eval;

    // --- 1. King Loss Chart with axes ---
    var losses = [];
    for (var i = 0; i < hist.length; i++) {
        losses.push(hist[i].avg_king_loss || 0);
    }
    if (ev && ev.avg_king_loss) losses.push(ev.avg_king_loss);

    var SVG = document.getElementById("chart");
    var W = 736, H = 160, ML = 60, MR = 12, MT = 12, MB = 28;
    var pw = W - ML - MR, ph = H - MT - MB;

    SVG.setAttribute("viewBox", "0 0 " + W + " " + H);

    if (losses.length < 1) {
        SVG.innerHTML = '<text x="' + (W/2) + '" y="' + (H/2) + '" text-anchor="middle" font-family="Space Mono,monospace" font-size="11" fill="#000">NO DATA</text>';
        document.getElementById("chart-meta").innerHTML = "<span>--</span>";
    } else {

    var minL = Math.min.apply(null, losses);
    var maxL = Math.max.apply(null, losses);
    var padV = (maxL - minL) * 0.15 || 0.5;
    minL -= padV; maxL += padV;

    function toX(i) { return ML + (losses.length > 1 ? (i / (losses.length - 1)) * pw : pw / 2); }
    function toY(v) { return MT + ph - ((v - minL) / (maxL - minL)) * ph; }

    var svg = '';
    var font = 'font-family="Space Mono,monospace" font-size="10" fill="#000"';

    // Y-axis line
    svg += '<line x1="' + ML + '" y1="' + MT + '" x2="' + ML + '" y2="' + (MT + ph) + '" stroke="#000" stroke-width="1"/>';
    // X-axis line
    svg += '<line x1="' + ML + '" y1="' + (MT + ph) + '" x2="' + (ML + pw) + '" y2="' + (MT + ph) + '" stroke="#000" stroke-width="1"/>';

    // Y-axis ticks (5 ticks)
    for (var t = 0; t <= 4; t++) {
        var val = minL + (maxL - minL) * (t / 4);
        var yy = toY(val);
        svg += '<line x1="' + (ML - 4) + '" y1="' + yy + '" x2="' + ML + '" y2="' + yy + '" stroke="#000" stroke-width="1"/>';
        svg += '<text x="' + (ML - 8) + '" y="' + (yy + 3) + '" text-anchor="end" ' + font + '>' + val.toFixed(2) + '</text>';
        if (t > 0 && t < 4) {
            svg += '<line x1="' + ML + '" y1="' + yy + '" x2="' + (ML + pw) + '" y2="' + yy + '" stroke="#000" stroke-width="0.3" stroke-dasharray="2 4"/>';
        }
    }

    // X-axis ticks (eval numbers)
    for (var i = 0; i < losses.length; i++) {
        var xx = toX(i);
        svg += '<line x1="' + xx + '" y1="' + (MT + ph) + '" x2="' + xx + '" y2="' + (MT + ph + 4) + '" stroke="#000" stroke-width="1"/>';
        var label = (ev && i === losses.length - 1) ? "NOW" : (hist.length > 0 && i < hist.length ? (i + 1) : "");
        svg += '<text x="' + xx + '" y="' + (MT + ph + 16) + '" text-anchor="middle" ' + font + '>' + label + '</text>';
    }

    // Data line
    var pts = [];
    for (var i = 0; i < losses.length; i++) {
        pts.push(toX(i).toFixed(1) + "," + toY(losses[i]).toFixed(1));
    }
    svg += '<polyline points="' + pts.join(" ") + '" fill="none" stroke="#000" stroke-width="1.5" stroke-linejoin="bevel"/>';

    // Data points
    for (var i = 0; i < losses.length; i++) {
        svg += '<circle cx="' + toX(i).toFixed(1) + '" cy="' + toY(losses[i]).toFixed(1) + '" r="3" fill="#000"/>';
    }

    SVG.innerHTML = svg;

    var latest = losses[losses.length - 1];
    document.getElementById("chart-meta").innerHTML =
        "<span>CURRENT: " + latest.toFixed(4) + "</span><span>EVALS: " + losses.length + "</span>";

    } // end chart data block

    // --- Current Duel ---
    var duelSec = document.getElementById("duel-section");
    if (ev) {
        duelSec.classList.remove("duel-hidden");
        var pct = ev.total > 0 ? Math.round((ev.progress / ev.total) * 100) : 0;
        var duelName = ev.challenger_repo || short(ev.hotkey, 12);
        var duelLabel = document.getElementById("duel-label");
        if (ev.challenger_repo) {
            duelLabel.innerHTML = '<a href="https://huggingface.co/' + ev.challenger_repo + '" target="_blank" style="color:var(--ink)">' + duelName + '</a>';
        } else {
            duelLabel.textContent = duelName;
        }
        document.getElementById("duel-bar").style.width = pct + "%";
        document.getElementById("duel-progress").textContent = ev.progress + " / " + ev.total + "  (" + pct + "%)";
        document.getElementById("duel-wr").textContent = ev.n > 0 ? "WR: " + (ev.win_rate * 100).toFixed(1) + "%" : "";
    } else {
        duelSec.classList.add("duel-hidden");
    }

    // --- Last Winner ---
    var lwEl = document.getElementById("last-winner");
    var winner = null;
    for (var i = 0; i < (d.history || []).length; i++) {
        if (d.history[i].accepted) { winner = d.history[i]; break; }
    }
    if (winner) {
        var repo = winner.challenger_repo || "--";
        var link = winner.challenger_repo ? '<a href="https://huggingface.co/' + repo + '" target="_blank" style="color:var(--ink)">' + repo + '</a>' : repo;
        lwEl.innerHTML = link + '<br>' +
            'WIN_RATE: ' + ((winner.win_rate || 0) * 100).toFixed(1) + '% &nbsp; ' +
            'KING_LOSS: ' + (winner.avg_king_loss || 0).toFixed(4) + ' &nbsp; ' +
            'CHALL_LOSS: ' + (winner.avg_challenger_loss || 0).toFixed(4) + ' &nbsp; ' +
            (winner.wall_time_s ? winner.wall_time_s.toFixed(0) + 's' : '');
    } else {
        lwEl.textContent = "NO DETHRONING YET";
    }

    // --- 2. Queue ---
    var qEl = document.getElementById("queue");
    var q = d.queue || [];
    if (q.length === 0) {
        qEl.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:16px">Queue empty</td></tr>';
    } else {
        qEl.innerHTML = q.map(function(e) {
            var repo = e.hf_repo || "--";
            var repoLink = e.hf_repo ? '<a href="https://huggingface.co/' + e.hf_repo + '" target="_blank" style="color:var(--ink)">' + repo + '</a>' : repo;
            return '<tr>' +
                '<td>' + short(e.hotkey, 16) + '</td>' +
                '<td>' + (e.block ? '#' + e.block : '--') + '</td>' +
                '<td>' + repoLink + '</td>' +
                '</tr>';
        }).join("");
    }

    // --- 4. Duel History ---
    var hb = document.getElementById("hist");
    var history = d.history || [];
    if (history.length === 0) {
        hb.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:16px">No duels yet</td></tr>';
    } else {
        hb.innerHTML = history.map(function(h) {
            return '<tr>' +
                '<td>' + (h.challenger_repo || short(h.hotkey, 12)) + '</td>' +
                '<td>' + (h.accepted ? "CHALLENGER" : "KING") + '</td>' +
                '<td>' + ((h.win_rate || 0) * 100).toFixed(1) + '%</td>' +
                '<td>' + (h.avg_king_loss || 0).toFixed(4) + '</td>' +
                '<td>' + (h.avg_challenger_loss || 0).toFixed(4) + '</td>' +
                '<td>' + (h.wall_time_s || 0).toFixed(0) + 's</td>' +
                '</tr>';
        }).join("");
    }
}

async function poll() {
    try {
        var r = await fetch(DATA_URL + "?t=" + Date.now());
        if (r.ok) render(await r.json());
    } catch (e) {}
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
